<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | CloudLearning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #050505; --surface: #111; --primary: #0078D4; --text-main: #fff; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; overflow: hidden; }
        
        /* Left Brand Panel */
        .brand-panel { flex: 1; background: linear-gradient(135deg, #050505 0%, #001e36 100%); padding: 40px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .brand-panel::after { content: ''; position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, rgba(0, 120, 212, 0.1) 0%, transparent 60%); top: -200px; left: -200px; }
        .logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem; font-weight: 900; color: white; text-decoration: none; position: relative; z-index: 10; }
        .logo span { color: var(--primary); }
        .brand-text { position: relative; z-index: 10; }
        .brand-text h1 { font-family: 'Plus Jakarta Sans'; font-size: 3rem; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
        .brand-text p { color: #a1a1aa; font-size: 1.1rem; max-width: 400px; line-height: 1.6; }

        /* Right Auth Panel */
        .auth-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background: var(--bg-dark); border-left: 1px solid var(--border); }
        .auth-box { width: 100%; max-width: 420px; }
        .auth-box h2 { font-family: 'Plus Jakarta Sans'; font-size: 2rem; margin-bottom: 8px; }
        .auth-box p { color: #888; margin-bottom: 30px; font-size: 0.95rem; }

        /* Interactive Floating Labels */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input { width: 100%; padding: 16px 16px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-group label { position: absolute; left: 16px; top: 16px; color: #666; font-size: 1rem; pointer-events: none; transition: 0.2s ease all; }
        .input-group input:focus, .input-group input:not(:placeholder-shown) { border-color: var(--primary); background: rgba(0, 120, 212, 0.05); }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label { top: 6px; font-size: 0.75rem; color: var(--primary); }

        .btn { width: 100%; padding: 14px; background: white; color: black; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        
        /* Loading Spinner Animation */
        .btn.loading { color: transparent; pointer-events: none; }
        .btn.loading::after { content: ""; position: absolute; width: 20px; height: 20px; top: 50%; left: 50%; margin: -10px 0 0 -10px; border: 3px solid rgba(0,0,0,0.3); border-top-color: black; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) { body { flex-direction: column; overflow: auto; } .brand-panel { flex: none; padding: 40px 20px; min-height: 30vh; } }
    </style>
</head>
<body>

    <div class="brand-panel">
        <a href="index.html" class="logo">Cloud<span>Portal</span></a>
        <div class="brand-text">
            <h1>Accelerate your career.</h1>
            <p>Access your live labs, recorded sessions, and direct mentorship channels in one unified workspace.</p>
        </div>
        <div style="color: #666; font-size: 0.8rem; position: relative; z-index: 10;">&copy; 2026 Enterprise Learning</div>
    </div>

    <div class="auth-panel">
        <div class="auth-box">
            <h2>Sign In</h2>
            <p>Enter your student credentials to continue.</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Work Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn" id="loginBtn">Authenticate Access</button>
            </form>
            <p style="text-align: center; margin-top: 24px; font-size: 0.9rem;"><a href="#" style="color: var(--primary); text-decoration: none;">Forgot your password?</a></p>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const password = document.getElementById('password').value; // Grab the typed password
            
            btn.classList.add('loading'); // Triggers the animated spinner
            
            // Simulating a backend check
            setTimeout(() => {
                btn.classList.remove('loading');
                
                // --- THE MASTER KEY CHECK ---
                if (password === "Azure2026") {
                    // Success! Go to the secret dashboard
                    window.location.href = "dashboard.html"; 
                } else {
                    // Failure! Show an error
                    alert('Access Denied: Incorrect password.');
                }
                
            }, 1500); // 1.5 second loading delay to look realistic
        }
    </script>
</body>
</html>
