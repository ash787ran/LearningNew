<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | CloudLearning</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0b0f19; --surface: #111827; --primary: #0ea5e9; --text-main: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { padding: 1.5rem 5%; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }

        .auth-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .auth-box h2 { font-family: 'Plus Jakarta Sans', sans-serif; margin-bottom: 8px; font-size: 1.8rem; }
        .auth-box p { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #0284c7; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Cloud<span>Portal</span></a>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access live classes.</p>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="student@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="alert('Demo Login Successful!')">Log In</button>
            <p style="text-align: center; margin-top: 20px; cursor: pointer; color: var(--primary);">Forgot Password?</p>
        </div>
    </div>

</body>
</html>
